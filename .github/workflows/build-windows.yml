name: Build Sandman (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r windows/requirements.txt

      - name: Build Sandman.exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --name=Sandman `
            --icon=windows/assets/icon_active.ico `
            --add-data "windows/assets;windows/assets" `
            windows/__main__.py

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(.+)$') { $v = $Matches[1] } else { $v = "0.0.0-dev" }
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.value }} `
            windows/installer.iss

      - name: Attach Windows artifacts to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Sandman.exe
            installer/Sandman-Setup-*.exe
          generate_release_notes: true
