name: Build Sandman

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r windows/requirements.txt

      - name: Build Sandman.exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --name=Sandman `
            --icon=windows/assets/icon_active.ico `
            --add-data "windows/assets;windows/assets" `
            windows/__main__.py

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(.+)$') { $v = $Matches[1] } else { $v = "0.0.0-dev" }
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.value }} `
            windows/installer.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/Sandman.exe
            installer/Sandman-Setup-*.exe

  # ── Android ────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        id: version
        run: |
          ref="${{ github.ref_name }}"
          if [[ "$ref" =~ ^v(.+)$ ]]; then
            v="${BASH_REMATCH[1]}"
          else
            v="0.0.0-dev"
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"

      # Decode the release keystore from a base64-encoded secret.
      # If the secret is not configured, the build falls back to a debug APK.
      - name: Decode signing keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/sandman-release.jks"
          echo "SANDMAN_KEYSTORE_FILE=$RUNNER_TEMP/sandman-release.jks" >> "$GITHUB_ENV"
          echo "SANDMAN_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "SANDMAN_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "SANDMAN_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Determine build variant
        id: variant
        run: |
          if [ -n "$SANDMAN_KEYSTORE_FILE" ]; then
            echo "task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_path=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
          else
            echo "task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_path=android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        working-directory: android
        run: ./gradlew ${{ steps.variant.outputs.task }}

      - name: Rename APK for release
        run: |
          cp "${{ steps.variant.outputs.apk_path }}" \
             "Sandman-${{ steps.version.outputs.value }}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: Sandman-*.apk

  # ── Release ────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-artifacts/dist/Sandman.exe
            windows-artifacts/installer/Sandman-Setup-*.exe
            android-artifacts/Sandman-*.apk
          generate_release_notes: true
